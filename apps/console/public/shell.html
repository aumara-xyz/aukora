<!DOCTYPE html>
<!-- Aukora Spatial — trinity shell (R31 parity build). Advisory surface: everything here is READ-ONLY.
     No custody, no signing, no authority in the browser. Parity reference: aukora-symbiote/spatial/app. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#111520" />
  <title>Aukora Spatial</title>
  <meta name="description" content="Read-only inside-out spatial shell for the Aukora organism. Triangle: AUMA LIVE · Square: AUMLOK, AURA, SPATIAL MAP, CONSOLE, SETTINGS · Circle: KNVS." />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="shell.css" />
</head>
<body class="shell-body">
  <a class="skip-link" href="#lane-canvas">Skip to the mounted app</a>

  <main id="shell">

    <!-- LEFT · Node inspector (green / hue-l) -->
    <section id="lane-l" class="lane" aria-label="Node inspector">
      <button class="corner corner-tr hue-l" id="corner-node" title="Push node out a third ([)" aria-label="Push the node lane out a third"></button>
      <div class="lane-inner">
        <header class="lane-head">
          <span class="lane-title hue-l-text">Node</span>
          <span class="head-meta" id="node-mode">DEMO_FIXTURE</span>
        </header>
        <div class="lane-body" id="node-body"></div>
      </div>
    </section>

    <!-- CENTER · canvas / organ mount (blue / hue-c) -->
    <section id="lane-canvas" class="lane lane-c" aria-label="Mounted app" tabindex="-1">
      <button class="corner corner-tl hue-c" id="corner-canvas-l" title="Widen center left (,)" aria-label="Widen the center lane left"></button>
      <button class="corner corner-tr hue-c" id="corner-canvas-r" title="Widen center right (.)" aria-label="Widen the center lane right"></button>
      <div class="lane-inner organ-wrap">
        <header class="organ-head">
          <h1 class="organ-title" id="organ-title">Console</h1>
          <p class="organ-sub" id="organ-sub"></p>
        </header>
        <div id="organ-host"></div>
      </div>
    </section>

    <!-- RIGHT · APPS portal menu (purple / hue-r) -->
    <section id="lane-r" class="lane" aria-label="Apps menu">
      <button class="corner corner-tl hue-r" id="corner-menu" title="Push apps out a third (])" aria-label="Push the apps lane out a third"></button>
      <div class="lane-inner">
        <header class="lane-head lane-head-right">
          <div class="tab-row" role="tablist" aria-label="App families">
            <button class="tab-btn active" role="tab" data-tab="triangle" id="tab-triangle" aria-selected="true" title="Triangle · Live" aria-label="Triangle family">
              <svg class="tab-shape" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2 14.5 13.5H1.5Z"/></svg>
            </button>
            <button class="tab-btn" role="tab" data-tab="square" id="tab-square" aria-selected="false" title="Square · System" aria-label="Square family">
              <svg class="tab-shape" viewBox="0 0 16 16" aria-hidden="true"><rect x="2.5" y="2.5" width="11" height="11" rx="1.2"/></svg>
            </button>
            <button class="tab-btn" role="tab" data-tab="circle" id="tab-circle" aria-selected="false" title="Circle · Frontier" aria-label="Circle family">
              <svg class="tab-shape" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="5.6"/></svg>
            </button>
          </div>
          <span class="head-meta" id="menu-micro">Live</span>
        </header>
        <div class="lane-body" id="menu-list" role="tabpanel" aria-label="Apps"></div>
      </div>
    </section>

  </main>

  <div class="edge-sliver sliver-l" id="sliver-l"></div>
  <div class="edge-sliver sliver-r" id="sliver-r"></div>

  <aside class="hint-card" id="hint-card" aria-label="Shell hint">
    <span>Corners size · nodes open.</span>
    <span class="hint-keys"><kbd class="hint-key">[</kbd><kbd class="hint-key">]</kbd><kbd class="hint-key">,</kbd><kbd class="hint-key">.</kbd></span>
    <button class="hint-dismiss" id="hint-dismiss" type="button">Got it</button>
  </aside>

  <noscript><p style="padding:20px;color:#f4f6ff">This shell renders the organism fixture with JavaScript. The data is in <code>fixture.json</code>.</p></noscript>

  <script src="fixture.js"></script>
  <script src="panels.js"></script>
  <script src="spatial-map.js"></script>
  <script src="apps.js"></script>
  <script src="shell.js"></script>
</body>
</html>
